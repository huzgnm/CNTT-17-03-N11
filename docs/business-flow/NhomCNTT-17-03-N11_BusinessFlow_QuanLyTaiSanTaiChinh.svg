<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Arial, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="1100" height="720" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="0" y="0" width="1100" height="50" fill="#1a237e"/>
  <text x="550" y="30" text-anchor="middle" fill="white" font-size="16" font-weight="bold">LUONG NGHIEP VU END-TO-END: HRM → Quan ly Tai san → Quan ly Tai chinh</text>
  <text x="550" y="45" text-anchor="middle" fill="#bbdefb" font-size="10">Nhom CNTT-17-03-N11 | Odoo 15 ERP</text>

  <!-- ===== SWIMLANE HEADERS ===== -->
  <!-- Lane 1: Nhan vien / Quan ly -->
  <rect x="0" y="50" width="110" height="670" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text transform="translate(20,385) rotate(-90)" text-anchor="middle" fill="#0d47a1" font-weight="bold" font-size="12">Nhan vien / Quan ly</text>

  <!-- Lane 2: HRM (nhan_su) -->
  <rect x="110" y="50" width="200" height="670" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="210" y="70" text-anchor="middle" fill="#1b5e20" font-weight="bold" font-size="13">HRM (nhan_su)</text>

  <!-- Lane 3: Quan ly Tai san -->
  <rect x="310" y="50" width="430" height="670" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="525" y="70" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="13">Quan ly Tai san (quan_ly_tai_san)</text>

  <!-- Lane 4: Quan ly Tai chinh -->
  <rect x="740" y="50" width="360" height="670" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="920" y="70" text-anchor="middle" fill="#4a148c" font-weight="bold" font-size="13">Quan ly Tai chinh (quan_ly_tai_chinh)</text>

  <!-- ===== STEP 1: Nhan vien yeu cau ===== -->
  <ellipse cx="55" cy="120" rx="40" ry="22" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="55" y="116" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Nhan vien</text>
  <text x="55" y="128" text-anchor="middle" fill="white" font-size="10">yeu cau</text>

  <!-- Step 1a: Ho so nhan vien HRM -->
  <rect x="130" y="100" width="155" height="42" rx="6" fill="#a5d6a7" stroke="#388e3c" stroke-width="1.5"/>
  <text x="207" y="117" text-anchor="middle" fill="#1b5e20" font-weight="bold" font-size="11">1. Ho so nhan vien</text>
  <text x="207" y="131" text-anchor="middle" fill="#1b5e20" font-size="10">Phong ban, Chuc vu</text>

  <!-- Arrow from actor to HRM -->
  <line x1="95" y1="120" x2="128" y2="121" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== STEP 2: Nhap tai san ===== -->
  <rect x="330" y="100" width="155" height="42" rx="6" fill="#ffcc80" stroke="#e65100" stroke-width="1.5"/>
  <text x="407" y="117" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="11">2. Nhap tai san moi</text>
  <text x="407" y="131" text-anchor="middle" fill="#bf360c" font-size="10">Chon nha cung cap</text>

  <!-- Arrow HRM → Tai san (lay nguoi quan ly) -->
  <line x1="287" y1="121" x2="328" y2="121" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow_green)"/>
  <text x="307" y="115" text-anchor="middle" fill="#388e3c" font-size="9">nhan_vien_id</text>

  <!-- Step 2b: Trang thai tai san -->
  <rect x="510" y="100" width="155" height="42" rx="6" fill="#ffcc80" stroke="#e65100" stroke-width="1.5"/>
  <text x="587" y="117" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="11">3. Theo doi tai san</text>
  <text x="587" y="131" text-anchor="middle" fill="#bf360c" font-size="10">Trang thai, Vi tri, Khau hao</text>
  <line x1="487" y1="121" x2="508" y2="121" stroke="#e65100" stroke-width="2" marker-end="url(#arrow_orange)"/>

  <!-- ===== BAO TRI FLOW ===== -->
  <rect x="20" y="215" width="70" height="35" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="55" y="229" text-anchor="middle" fill="#0d47a1" font-size="10">Quan ly</text>
  <text x="55" y="242" text-anchor="middle" fill="#0d47a1" font-size="10">yeu cau bao tri</text>

  <rect x="130" y="210" width="155" height="42" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="207" y="227" text-anchor="middle" fill="#1b5e20" font-weight="bold" font-size="11">4. Lay thong tin NV</text>
  <text x="207" y="241" text-anchor="middle" fill="#1b5e20" font-size="10">nhan_su → nha cung cap</text>

  <rect x="330" y="210" width="155" height="42" rx="6" fill="#ffcc80" stroke="#e65100" stroke-width="1.5"/>
  <text x="407" y="227" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="11">5. Tao Phieu Bao tri</text>
  <text x="407" y="241" text-anchor="middle" fill="#bf360c" font-size="10">tinh_trang: cho_duyet</text>

  <rect x="510" y="210" width="155" height="42" rx="6" fill="#ffcc80" stroke="#e65100" stroke-width="1.5"/>
  <text x="587" y="227" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="11">6. Bat dau → Hoan thanh</text>
  <text x="587" y="241" text-anchor="middle" fill="#bf360c" font-size="10">Tai san: bao_tri → dang_su_dung</text>

  <line x1="91" y1="232" x2="128" y2="231" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="287" y1="231" x2="328" y2="231" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow_green)"/>
  <line x1="487" y1="231" x2="508" y2="231" stroke="#e65100" stroke-width="2" marker-end="url(#arrow_orange)"/>

  <!-- TRIGGER MUC 2: Bao tri → Phieu Chi -->
  <rect x="760" y="205" width="175" height="52" rx="8" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="847" y="222" text-anchor="middle" fill="#4a148c" font-weight="bold" font-size="11">🤖 AUTO: Tao Phieu Chi</text>
  <text x="847" y="237" text-anchor="middle" fill="#4a148c" font-size="10">Nguon: chi phi bao tri</text>
  <text x="847" y="250" text-anchor="middle" fill="#4a148c" font-size="10">Trang thai: cho_duyet</text>
  <line x1="667" y1="231" x2="758" y2="231" stroke="#6a1b9a" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow_purple)"/>
  <rect x="685" y="216" width="68" height="18" rx="3" fill="#ff5722"/>
  <text x="719" y="229" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TRIGGER M2</text>

  <!-- THANH LY FLOW -->
  <rect x="20" y="330" width="70" height="35" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="55" y="344" text-anchor="middle" fill="#0d47a1" font-size="10">Quan ly</text>
  <text x="55" y="357" text-anchor="middle" fill="#0d47a1" font-size="10">quyet dinh TL</text>

  <rect x="130" y="325" width="155" height="42" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="207" y="342" text-anchor="middle" fill="#1b5e20" font-weight="bold" font-size="11">7. Lay Nguoi lap</text>
  <text x="207" y="356" text-anchor="middle" fill="#1b5e20" font-size="10">nguoi_lap_id tu nhan_su</text>

  <rect x="330" y="325" width="155" height="42" rx="6" fill="#ffcc80" stroke="#e65100" stroke-width="1.5"/>
  <text x="407" y="342" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="11">8. Tao Phieu Thanh ly</text>
  <text x="407" y="356" text-anchor="middle" fill="#bf360c" font-size="10">gia_tri_thu_hoi, ly_do</text>

  <rect x="510" y="325" width="155" height="42" rx="6" fill="#ffcc80" stroke="#e65100" stroke-width="1.5"/>
  <text x="587" y="342" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="11">9. Duyet Thanh ly</text>
  <text x="587" y="356" text-anchor="middle" fill="#bf360c" font-size="10">Tai san → da_thanh_ly</text>

  <line x1="91" y1="347" x2="128" y2="346" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="287" y1="346" x2="328" y2="346" stroke="#388e3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow_green)"/>
  <line x1="487" y1="346" x2="508" y2="346" stroke="#e65100" stroke-width="2" marker-end="url(#arrow_orange)"/>

  <!-- TRIGGER MUC 2: Thanh ly → Phieu Thu -->
  <rect x="760" y="320" width="175" height="52" rx="8" fill="#ce93d8" stroke="#6a1b9a" stroke-width="2"/>
  <text x="847" y="337" text-anchor="middle" fill="#4a148c" font-weight="bold" font-size="11">🤖 AUTO: Tao Phieu Thu</text>
  <text x="847" y="352" text-anchor="middle" fill="#4a148c" font-size="10">Nguon: thanh ly tai san</text>
  <text x="847" y="365" text-anchor="middle" fill="#4a148c" font-size="10">Trang thai: cho_duyet</text>
  <line x1="667" y1="346" x2="758" y2="346" stroke="#6a1b9a" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow_purple)"/>
  <rect x="685" y="331" width="68" height="18" rx="3" fill="#ff5722"/>
  <text x="719" y="344" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TRIGGER M2</text>

  <!-- DUYET PHIEU THU CHI -->
  <rect x="20" y="445" width="70" height="35" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="55" y="459" text-anchor="middle" fill="#0d47a1" font-size="10">Ke toan</text>
  <text x="55" y="472" text-anchor="middle" fill="#0d47a1" font-size="10">duyet phieu</text>

  <rect x="760" y="435" width="175" height="42" rx="6" fill="#ba68c8" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="847" y="452" text-anchor="middle" fill="white" font-weight="bold" font-size="11">10. Ke toan duyet Phieu</text>
  <text x="847" y="466" text-anchor="middle" fill="white" font-size="10">trang_thai: da_duyet</text>

  <line x1="91" y1="462" x2="758" y2="458" stroke="#1565c0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TELEGRAM TRIGGER MUC 3 -->
  <rect x="760" y="498" width="175" height="62" rx="8" fill="#7b1fa2" stroke="#4a148c" stroke-width="2.5"/>
  <text x="847" y="516" text-anchor="middle" fill="white" font-weight="bold" font-size="12">📱 Telegram Bot</text>
  <text x="847" y="532" text-anchor="middle" fill="#e1bee7" font-size="10">Input: so tien, loai phieu</text>
  <text x="847" y="546" text-anchor="middle" fill="#e1bee7" font-size="10">API: api.telegram.org</text>
  <text x="847" y="560" text-anchor="middle" fill="#e1bee7" font-size="10">Output: thong bao nhom</text>
  <line x1="847" y1="479" x2="847" y2="496" stroke="#4a148c" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow_purple)"/>
  <rect x="800" y="483" width="68" height="18" rx="3" fill="#f44336"/>
  <text x="834" y="496" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TRIGGER M3</text>

  <!-- KHAU HAO CRON -->
  <rect x="510" y="440" width="185" height="48" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="1.5"/>
  <text x="602" y="460" text-anchor="middle" fill="#bf360c" font-weight="bold" font-size="11">Cron: Khau hao hang thang</text>
  <text x="602" y="475" text-anchor="middle" fill="#bf360c" font-size="10">Ngay 1 hang thang tu dong chay</text>

  <rect x="760" y="575" width="175" height="42" rx="6" fill="#e1bee7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="847" y="592" text-anchor="middle" fill="#4a148c" font-weight="bold" font-size="11">11. Bao cao Tai san</text>
  <text x="847" y="606" text-anchor="middle" fill="#4a148c" font-size="10">Tong hop cuoi nam</text>

  <line x1="602" y1="488" x2="758" y2="594" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow_orange)"/>

  <!-- ===== LEGEND ===== -->
  <rect x="10" y="635" width="1080" height="75" rx="6" fill="#eceff1" stroke="#90a4ae" stroke-width="1"/>
  <text x="20" y="652" fill="#37474f" font-weight="bold" font-size="11">CHU THICH:</text>
  <!-- Solid line -->
  <line x1="20" y1="667" x2="60" y2="667" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="65" y="671" fill="#37474f" font-size="10">Hanh dong nguoi dung</text>
  <!-- Dashed line -->
  <line x1="195" y1="667" x2="235" y2="667" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow_green)"/>
  <text x="240" y="671" fill="#37474f" font-size="10">Du lieu lay tu HRM</text>
  <!-- Trigger M2 -->
  <rect x="370" y="657" width="68" height="18" rx="3" fill="#ff5722"/>
  <text x="404" y="670" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TRIGGER M2</text>
  <text x="445" y="671" fill="#37474f" font-size="10"> Tu dong tao ban ghi sang module khac</text>
  <!-- Trigger M3 -->
  <rect x="640" y="657" width="68" height="18" rx="3" fill="#f44336"/>
  <text x="674" y="670" text-anchor="middle" fill="white" font-size="10" font-weight="bold">TRIGGER M3</text>
  <text x="715" y="671" fill="#37474f" font-size="10"> Goi Telegram External API</text>

  <text x="20" y="698" fill="#546e7a" font-size="10">Luong: HRM (ho so nhan vien, phong ban, chuc vu) → QLTS (bao tri, thanh ly tai san) → QLTC (phieu thu/chi tu dong, Telegram notification)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1565c0"/>
    </marker>
    <marker id="arrow_green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow_orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e65100"/>
    </marker>
    <marker id="arrow_purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6a1b9a"/>
    </marker>
  </defs>
</svg>
